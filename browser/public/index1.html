<!DOCTYPE html>
<html>
<head>
    <title>My Cloud Browser</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: Arial; }
        .nav { padding: 10px; background: #333; display: flex; gap: 10px; }
        input { flex: 1; padding: 5px; border-radius: 4px; border: none; }
        iframe { flex: 1; border: none; background: white; }
    </style>
</head>
<body>
    <div class="nav">
        <input type="text" id="url" value="instagram.com">
        <button onclick="load()">Go</button>
    </div>
    <iframe id="viewport"></iframe>

    <script>
        function load() {
            const urlValue = document.getElementById('url').value;
            // Routes the request through your Render backend proxy
            document.getElementById('viewport').src = window.location.origin + "/browser-proxy/";
        }
        // Load Instagram by default
        window.onload = load;
    </script>
</body>
</html>
